<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVICTUS II | MISSION CONTROL</title>
    <!-- Site-wide transparent logo favicon. -->
    <link rel="icon" type="image/png" href="/images/logo_w_tp.png">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.iife.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-deep: #0a0b10;
            --bg-card: #15171e;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --danger: #ff4d4d;
            --success: #00ff88;
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.05);
        }

        ::selection {
            background: #e5e5e5;
            color: #050505;
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: grid;
            grid-template-rows: 60px 1fr;
            overflow: hidden;
        }

        header {
            background: rgba(21, 23, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        main {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 1px;
            background: var(--border);
        }

        .panel {
            background: var(--bg-deep);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .card-header {
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .data-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .data-unit {
            font-size: 0.9rem;
            color: #666;
            margin-left: 4px;
        }

        #map {
            height: 400px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .source-selector {
            display: flex;
            gap: 10px;
        }

        .source-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .source-btn.active {
            background: var(--accent);
            color: var(--bg-deep);
            border-color: var(--accent);
        }

        .log-panel {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            height: 200px;
            overflow-y: auto;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
        }

        .log-entry {
            margin-bottom: 4px;
            border-left: 2px solid var(--accent);
            padding-left: 8px;
        }

        .log-time { color: #666; margin-right: 8px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
                <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                <path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"/>
                <path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"/>
            </svg>
            INVICTUS II
        </div>
        <div class="source-selector">
            <button class="source-btn active" onclick="setSource('cansat')">CANSAT</button>
            <button class="source-btn" onclick="setSource('nrc')">NRC SAT</button>
            <button class="source-btn" onclick="setSource('rover')">ORT ROVER</button>
        </div>
        <div class="status-badge" id="system-status">System Ready</div>
    </header>

    <main>
        <div class="panel">
            <div class="card">
                <div class="card-header">Altitude</div>
                <div class="data-value" id="val-alt">0.00<span class="data-unit">m</span></div>
            </div>
            <div class="card">
                <div class="card-header">Temperature</div>
                <div class="data-value" id="val-temp">0.0<span class="data-unit">°C</span></div>
            </div>
            <div class="card">
                <div class="card-header">Pressure</div>
                <div class="data-value" id="val-pres">1013.2<span class="data-unit">hPa</span></div>
            </div>
            <div class="card">
                <div class="card-header">Packet ID</div>
                <div class="data-value" id="val-pkt">0</div>
            </div>
        </div>

        <div class="panel" style="padding: 1px;">
            <div id="map" style="height: 60%; width: 100%;"></div>
            <div class="log-panel" id="log-console">
                <div class="log-entry"><span class="log-time">00:00:00</span> GCS Initialized. Waiting for heartbeat...</div>
            </div>
        </div>

        <div class="panel">
            <div class="card">
                <div class="card-header">G-Force (Z)</div>
                <div class="data-value" id="val-acc">0.00<span class="data-unit">G</span></div>
            </div>
            <div class="card">
                <div class="card-header">Signal Strength</div>
                <div class="data-value" id="val-rssi">-0<span class="data-unit">dBm</span></div>
            </div>
            <div class="card">
                <div class="card-header">Mission Phase</div>
                <div class="data-value" id="val-phase" style="font-size: 1.2rem; color: var(--accent);">STANDBY</div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        let currentSource = 'cansat';
        let map, marker, path;
        let coords = [52.4508, -1.9305]; // UoB default

        socket.on('connect', () => {
            socket.emit('subscribe_source', { source: 'ALL' });
            socket.emit('request_history', { source: 'CANSAT', limit: 200 });
            log('Backend socket connected.');
        });

        socket.on('disconnect', () => log('Backend socket disconnected.'));
        socket.on('signal_lost', (evt) => log(`SIGNAL LOST: ${evt.source} gap ${Math.round(evt.gap_ms / 1000)}s`));
        socket.on('signal_recovered', (evt) => log(`SIGNAL RECOVERED: ${evt.source}`));
        socket.on('mission_event', (evt) => {
            if (!evt || !evt.event_type) return;
            document.getElementById('val-phase').textContent = evt.event_type;
            log(`${evt.source} phase: ${evt.event_type}`);
        });

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(coords, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            marker = L.marker(coords).addTo(map);
            path = L.polyline([], { color: '#00f2ff' }).addTo(map);
        }

        function setSource(src) {
            currentSource = src;
            document.querySelectorAll('.source-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(src));
            });
            log(`Switched source to ${src.toUpperCase()}`);
            // Clear current values
            document.querySelectorAll('.data-value').forEach(v => {
                if(!v.querySelector('.data-unit')) return;
                v.childNodes[0].textContent = "0.00";
            });
        }

        function log(msg) {
            const console = document.getElementById('log-console');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">${time}</span> ${msg}`;
            console.prepend(entry);
        }

        function handleTelemetry(payload) {
            const data = payload && payload.data ? payload.data : payload;
            if (!data) return;
            // Filter by current source
            if (currentSource === 'cansat' && data.source !== 'CANSAT') return;
            if (currentSource === 'nrc' && data.source !== 'NRC') return;
            if (currentSource === 'rover' && data.source !== 'ROVER') return;

            document.getElementById('val-alt').childNodes[0].textContent = data.altitude_m?.toFixed(2) || "0.00";
            document.getElementById('val-temp').childNodes[0].textContent = data.temp_c?.toFixed(1) || "0.0";
            document.getElementById('val-pres').childNodes[0].textContent = data.pressure_hpa?.toFixed(1) || "1013.2";
            document.getElementById('val-pkt').textContent = data.pkt_id;
            document.getElementById('val-acc').childNodes[0].textContent = data.accel_z?.toFixed(2) || "0.00";
            document.getElementById('val-rssi').childNodes[0].textContent = data.rssi_dbm || "-0";

            if (data.lat && data.lon) {
                const newPos = [data.lat, data.lon];
                marker.setLatLng(newPos);
                path.addLatLng(newPos);
                map.panTo(newPos);
            }

            if (data.flags) {
                const phase = data.flags & 0x02 ? 'DESCENT' : (data.flags & 0x01 ? 'POWERED FLIGHT' : 'STANDBY');
                document.getElementById('val-phase').textContent = phase;
            }
        }

        socket.on('packet', handleTelemetry);
        socket.on('telemetry', handleTelemetry);
        socket.on('history', (history) => {
            const packets = history?.packets || history?.cansat || [];
            packets.forEach(handleTelemetry);
        });

        initMap();
    </script>
</body>
</html>
