<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NRC Flight Review</title>
  <meta name="description" content="NRC post-flight SD card review for Invictus II">
  <link rel="icon" type="image/png" href="/images/logo_w_tp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000;
      --panel: #050505;
      --panel-soft: #0a0a0a;
      --line: #202020;
      --line-strong: #3a3a3a;
      --text: #ffffff;
      --muted: #a0a0a0;
      --dim: #6e6e6e;
      --accent: #ffffff;
      --accent-2: #ffffff;
      --ok: #ffffff;
      --bad: #ffffff;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    body {
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px) 0 0 / 96px 96px,
        linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px) 0 0 / 96px 96px,
        var(--bg);
    }
    button, input { font: inherit; }
    #app { max-width: 1320px; margin: 0 auto; min-height: calc(100vh - 44px); display: grid; grid-template-rows: auto 1fr; gap: 16px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      min-height: 74px; padding: 0 0 18px; border-bottom: 1px solid var(--text);
    }
    .brand { display: flex; flex-direction: column; gap: 8px; }
    h1 { font-size: clamp(1.7rem, 2.7vw, 2.55rem); line-height: 0.95; letter-spacing: -0.02em; font-weight: 700; }
    .subtitle { color: var(--muted); font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.14em; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      min-height: 42px; border: 1px solid var(--line-strong); border-radius: 2px; padding: 0 16px;
      background: transparent; color: var(--text); cursor: pointer; font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.11em;
    }
    .btn.primary { background: var(--text); color: #050505; border-color: var(--text); }
    .btn:disabled { color: var(--dim); border-color: var(--line); cursor: not-allowed; background: rgba(255,255,255,0.02); }
    .btn:not(:disabled):hover { border-color: var(--text); background: rgba(255,255,255,0.08); }
    .btn.primary:not(:disabled):hover { background: #d8d8d8; color: #000; }
    main { display: grid; grid-template-columns: minmax(300px, 360px) minmax(0, 1fr); gap: 16px; min-height: 0; }
    .panel {
      border: 1px solid var(--line-strong); border-radius: 2px; background: rgba(5,5,5,0.94);
      min-width: 0;
    }
    .upload-panel { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .dropzone {
      border: 1px dashed var(--line-strong); border-radius: 2px; min-height: 206px; padding: 18px;
      display: grid; place-items: center; text-align: center; background: var(--panel-soft);
      transition: border-color 0.16s ease, background 0.16s ease;
    }
    .dropzone.dragover { border-color: var(--text); background: rgba(255,255,255,0.08); }
    .drop-inner { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .upload-icon {
      width: 48px; height: 48px; border: 1px solid var(--line-strong); border-radius: 2px;
      display: grid; place-items: center; color: var(--accent);
    }
    .upload-icon svg { width: 25px; height: 25px; stroke: currentColor; stroke-width: 1.65; fill: none; }
    .drop-title { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; }
    .drop-meta { color: var(--muted); font-family: var(--mono); font-size: 0.68rem; line-height: 1.6; word-break: break-word; }
    .status {
      min-height: 40px; border-top: 1px solid var(--line-strong); padding-top: 14px;
      color: var(--muted); font-family: var(--mono); font-size: 0.68rem; line-height: 1.55;
    }
    .status.ok { color: var(--ok); }
    .status.bad { color: var(--bad); }
    .summary-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .summary-tile {
      border: 1px solid var(--line); border-radius: 2px; padding: 14px 14px 13px; background: #030303;
      display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 12px;
    }
    .tile-label {
      color: var(--muted); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
    }
    .tile-value { font-family: var(--mono); font-size: 1.12rem; font-weight: 600; font-variant-numeric: tabular-nums; text-align: right; }
    .tile-value.accent { color: var(--accent); }
    .review-panel { display: grid; grid-template-rows: auto 1fr auto; min-height: 640px; }
    .chart-head {
      padding: 18px 18px 16px; border-bottom: 1px solid var(--line-strong);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .chart-title { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .chart-title h2 { font-size: 0.92rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; }
    .chart-title span { color: var(--muted); font-family: var(--mono); font-size: 0.68rem; overflow-wrap: anywhere; }
    .chart-readout { font-family: var(--mono); color: var(--accent); font-size: 0.78rem; text-align: right; white-space: nowrap; letter-spacing: 0.05em; }
    .chart-wrap { position: relative; min-height: 450px; padding: 18px; background: #020202; }
    #altitude-chart { width: 100%; height: 100%; min-height: 450px; display: block; }
    .empty-state {
      position: absolute; inset: 18px; display: grid; place-items: center; text-align: center;
      color: var(--dim); font-family: var(--mono); font-size: 0.74rem; border: 1px solid var(--line);
      border-radius: 2px; background: #030303; letter-spacing: 0.16em;
    }
    .table-wrap { border-top: 1px solid var(--line-strong); max-height: 190px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.68rem; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.11em; background: #030303; position: sticky; top: 0; }
    td { color: var(--text); }
    @media (max-width: 900px) {
      body { padding: 14px; }
      #app { min-height: calc(100vh - 28px); }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { width: 100%; justify-content: stretch; }
      .btn { flex: 1; }
      main { grid-template-columns: 1fr; }
      .chart-head { align-items: flex-start; flex-direction: column; }
      .chart-readout { text-align: left; }
      .review-panel { min-height: 520px; }
      .chart-wrap, #altitude-chart { min-height: 360px; }
      .summary-tile { grid-template-columns: 1fr; gap: 8px; }
      .tile-value { text-align: left; font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1>NRC Flight Review</h1>
        <div class="subtitle">SD card recovery · altitude vs time</div>
      </div>
      <div class="actions">
        <button class="btn primary" id="select-btn" type="button">Select CSV</button>
        <button class="btn" id="download-btn" type="button" disabled>Download Upload</button>
        <input id="file-input" type="file" accept=".csv,text/csv" hidden>
      </div>
    </header>

    <main>
      <aside class="panel upload-panel">
        <section class="dropzone" id="dropzone">
          <div class="drop-inner">
            <div class="upload-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3v12"></path>
                <path d="m7 8 5-5 5 5"></path>
                <path d="M5 15v4h14v-4"></path>
              </svg>
            </div>
            <div class="drop-title">Load NRC Flight CSV</div>
            <div class="drop-meta" id="file-meta">No upload loaded</div>
          </div>
        </section>

        <div class="summary-grid">
          <div class="summary-tile">
            <div class="tile-label">Apogee</div>
            <div class="tile-value accent" id="sum-apogee">--.- ft</div>
          </div>
          <div class="summary-tile">
            <div class="tile-label">Apogee Time</div>
            <div class="tile-value" id="sum-apogee-time">T+--.- s</div>
          </div>
          <div class="summary-tile">
            <div class="tile-label">Rows</div>
            <div class="tile-value" id="sum-rows">0</div>
          </div>
          <div class="summary-tile">
            <div class="tile-label">Duration</div>
            <div class="tile-value" id="sum-duration">--.- s</div>
          </div>
        </div>

        <div class="status" id="status">Waiting for recovered NRC SD data.</div>
      </aside>

      <section class="panel review-panel">
        <div class="chart-head">
          <div class="chart-title">
            <h2>Altitude Trace</h2>
            <span id="upload-label">No upload selected</span>
          </div>
          <div class="chart-readout" id="chart-readout">APOGEE --.- FT</div>
        </div>
        <div class="chart-wrap">
          <canvas id="altitude-chart"></canvas>
          <div class="empty-state" id="empty-state">CSV REQUIRED</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Packet</th>
                <th>T+ seconds</th>
                <th>Altitude ft</th>
                <th>Temp C</th>
                <th>Pressure hPa</th>
              </tr>
            </thead>
            <tbody id="packet-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      'use strict';

      const $ = (id) => document.getElementById(id);
      const fileInput = $('file-input');
      const selectBtn = $('select-btn');
      const downloadBtn = $('download-btn');
      const dropzone = $('dropzone');
      const canvas = $('altitude-chart');
      const ctx = canvas.getContext('2d');
      let activePackets = [];
      let activeUpload = null;

      const backendOrigin = (() => {
        const isHttp = window.location.protocol === 'http:' || window.location.protocol === 'https:';
        if (!isHttp) return 'http://localhost:3000';
        if (window.location.port === '5500') return window.location.protocol + '//' + (window.location.hostname || 'localhost') + ':3000';
        return window.location.origin;
      })();
      const apiUrl = (path) => backendOrigin + path;

      function setStatus(message, type = '') {
        const el = $('status');
        el.textContent = message;
        el.className = `status ${type}`.trim();
      }

      function formatNumber(value, decimals = 1) {
        return Number.isFinite(value) ? value.toFixed(decimals) : '--.-';
      }

      function flightSeconds(packet, firstTimestamp) {
        return ((packet.timestamp_ms || firstTimestamp) - firstTimestamp) / 1000;
      }

      function findApogee(packets) {
        return packets.reduce((best, packet) => {
          if (!Number.isFinite(packet.altitude_m)) return best;
          return !best || packet.altitude_m > best.altitude_m ? packet : best;
        }, null);
      }

      function summarizePackets(packets, upload) {
        const firstTimestamp = packets[0]?.timestamp_ms || 0;
        const lastTimestamp = packets[packets.length - 1]?.timestamp_ms || firstTimestamp;
        const apogee = findApogee(packets);
        const apogeeTime = apogee ? flightSeconds(apogee, firstTimestamp) : NaN;
        const duration = Math.max(0, (lastTimestamp - firstTimestamp) / 1000);

        $('sum-apogee').textContent = `${formatNumber(apogee?.altitude_m * 3.28084)} ft`;
        $('sum-apogee-time').textContent = `T+${formatNumber(apogeeTime)} s`;
        $('sum-rows').textContent = String(packets.length);
        $('sum-duration').textContent = `${formatNumber(upload?.duration_s ?? duration)} s`;
        $('chart-readout').textContent = `APOGEE ${formatNumber(apogee?.altitude_m * 3.28084)} FT`;
      }

      function sizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { width: rect.width, height: rect.height };
      }

      function drawChart(packets) {
        const { width, height } = sizeCanvas();
        ctx.clearRect(0, 0, width, height);
        if (!packets.length) return;

        const padding = { left: 58, right: 24, top: 28, bottom: 44 };
        const plotW = Math.max(1, width - padding.left - padding.right);
        const plotH = Math.max(1, height - padding.top - padding.bottom);
        const firstTimestamp = packets[0].timestamp_ms || 0;
        const xs = packets.map((packet) => flightSeconds(packet, firstTimestamp));
        const ys = packets.map((packet) => packet.altitude_m * 3.28084);
        const maxX = Math.max(1, ...xs);
        const minY = Math.min(0, ...ys);
        const maxY = Math.max(10, ...ys);
        const yRange = Math.max(1, maxY - minY);
        const xPos = (x) => padding.left + (x / maxX) * plotW;
        const yPos = (y) => padding.top + (1 - ((y - minY) / yRange)) * plotH;

        ctx.strokeStyle = '#242424';
        ctx.lineWidth = 1;
        ctx.font = '11px JetBrains Mono, monospace';
        ctx.fillStyle = '#777777';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let i = 0; i <= 4; i++) {
          const y = padding.top + (plotH / 4) * i;
          const value = maxY - (yRange / 4) * i;
          ctx.beginPath();
          ctx.moveTo(padding.left, y);
          ctx.lineTo(width - padding.right, y);
          ctx.stroke();
          ctx.fillText(value.toFixed(0), padding.left - 10, y);
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let i = 0; i <= 4; i++) {
          const x = padding.left + (plotW / 4) * i;
          const value = (maxX / 4) * i;
          ctx.beginPath();
          ctx.moveTo(x, padding.top);
          ctx.lineTo(x, height - padding.bottom);
          ctx.stroke();
          ctx.fillText(`${value.toFixed(0)}s`, x, height - padding.bottom + 12);
        }

        const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.20)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0.02)');
        ctx.beginPath();
        xs.forEach((x, index) => {
          const px = xPos(x);
          const py = yPos(ys[index]);
          if (index === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.lineTo(xPos(xs[xs.length - 1]), height - padding.bottom);
        ctx.lineTo(xPos(xs[0]), height - padding.bottom);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        xs.forEach((x, index) => {
          const px = xPos(x);
          const py = yPos(ys[index]);
          if (index === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        const apogee = findApogee(packets);
        if (apogee) {
          const t = flightSeconds(apogee, firstTimestamp);
          const ax = xPos(t);
          const ay = yPos(apogee.altitude_m * 3.28084);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.58)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(ax, padding.top);
          ctx.lineTo(ax, height - padding.bottom);
          ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(ax, ay, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.font = '12px JetBrains Mono, monospace';
          ctx.textAlign = ax > width - 180 ? 'right' : 'left';
          ctx.textBaseline = 'bottom';
          ctx.fillText(`APOGEE ${(apogee.altitude_m * 3.28084).toFixed(1)}FT @ T+${t.toFixed(1)}S`, ax + (ax > width - 180 ? -10 : 10), ay - 10);
        }

        ctx.fillStyle = '#888888';
        ctx.font = '11px JetBrains Mono, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('TIME SINCE BOOT', padding.left + plotW / 2, height - 4);
        ctx.save();
        ctx.translate(14, padding.top + plotH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('ALTITUDE FT', 0, 0);
        ctx.restore();
      }

      function renderTable(packets) {
        const firstTimestamp = packets[0]?.timestamp_ms || 0;
        $('packet-table').innerHTML = packets.slice(-12).map((packet) => `
          <tr>
            <td>${packet.pkt_id ?? ''}</td>
            <td>${formatNumber(flightSeconds(packet, firstTimestamp))}</td>
            <td>${formatNumber(packet.altitude_m * 3.28084)}</td>
            <td>${formatNumber(packet.temp_c)}</td>
            <td>${formatNumber(packet.pressure_hpa, 2)}</td>
          </tr>
        `).join('');
      }

      function renderUpload(upload, packets) {
        activeUpload = upload;
        activePackets = packets;
        $('empty-state').style.display = packets.length ? 'none' : 'grid';
        $('file-meta').textContent = upload?.filename || `Upload #${upload?.upload_id || '--'}`;
        $('upload-label').textContent = upload?.filename ? `${upload.filename} · upload ${upload.upload_id}` : `Upload ${upload?.upload_id || '--'}`;
        downloadBtn.disabled = packets.length === 0;
        summarizePackets(packets, upload);
        renderTable(packets);
        drawChart(packets);
      }

      async function fetchUploadPackets(uploadId) {
        const res = await fetch(apiUrl(`/api/sd-uploads/${uploadId}/packets`));
        const payload = await res.json().catch(() => null);
        if (!res.ok) throw new Error(payload?.error || `packets ${res.status}`);
        return payload.packets || [];
      }

      async function uploadFile(file) {
        if (!file) return;
        const form = new FormData();
        form.append('source', 'NRC');
        form.append('file', file);
        selectBtn.disabled = true;
        setStatus('Uploading SD CSV...');
        try {
          const res = await fetch(apiUrl('/api/upload-sd'), { method: 'POST', body: form });
          const payload = await res.json().catch(() => null);
          if (!res.ok) throw new Error(payload?.error || `upload ${res.status}`);
          const packets = await fetchUploadPackets(payload.upload_id);
          renderUpload({ ...payload, filename: payload.filename || file.name }, packets);
          setStatus(`Loaded ${payload.inserted} rows from ${file.name}.`, 'ok');
        } catch (error) {
          setStatus(`Upload failed: ${error.message}`, 'bad');
        } finally {
          selectBtn.disabled = false;
          fileInput.value = '';
        }
      }

      function csvEscape(value) {
        if (value === null || value === undefined) return '';
        const text = String(value);
        return /[,"\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      }

      function downloadActiveUpload() {
        if (!activePackets.length) return;
        const columns = ['pkt_id', 'timestamp_ms', 'altitude_m', 'temp_c', 'pressure_hpa', 'lat', 'lon', 'flags'];
        const csv = [
          columns.join(','),
          ...activePackets.map((packet) => columns.map((column) => csvEscape(packet[column])).join(','))
        ].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `nrc-upload-${activeUpload?.upload_id || 'flight'}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      selectBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (event) => uploadFile(event.target.files[0]));
      downloadBtn.addEventListener('click', downloadActiveUpload);
      dropzone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropzone.classList.add('dragover');
      });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
      dropzone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragover');
        uploadFile(event.dataTransfer.files[0]);
      });
      window.addEventListener('resize', () => drawChart(activePackets));
      sizeCanvas();
    })();
  </script>
</body>
</html>
