; PlatformIO configuration for the INVICTUS II Ground Station Receiver
; Hardware: ESP32 WROOM-32 + RFM95W 868 MHz
; Role: Receives MACHX2 ASCII telemetry from CanSat, forwards raw frames over USB Serial.

[env:esp32_ground_station]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 921600
monitor_speed = 115200

lib_deps =
    mikem/RadioHead @ ^1.120
