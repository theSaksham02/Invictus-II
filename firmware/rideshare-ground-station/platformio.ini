; PlatformIO configuration for Mach-X Rideshare LoRa ground receiver
; Hardware: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
; Role: Receive MXR2/MXR3 LoRa telemetry and forward valid lines to USB Serial.

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
upload_speed = 115200
upload_flags =
    --before=default_reset
    --after=hard_reset
monitor_speed = 115200

lib_deps =
    jgromes/RadioLib @ ^6.6.0

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
