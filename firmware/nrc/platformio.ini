; PlatformIO configuration for Mach-X Rideshare Payload
; Hardware: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262 LoRa + SSD1306 OLED)
; Sensors:  BMP280, NEO-6M GPS, LM75, SD Card

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
upload_speed = 115200
upload_flags =
    --before=default_reset
    --after=hard_reset
monitor_speed = 115200
build_src_filter =
    +<main.cpp>
    -<nrc_test.cpp>

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    mikalhart/TinyGPSPlus @ ^1.0.3
    olikraus/U8g2 @ ^2.35.19

build_flags =
    -DENABLE_RIDESHARE_LIVE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; Mach-X Rideshare default is live LoRa/USB telemetry plus SD/OLED recovery backup.
    ; Add -DLORA_DUTY_LIMIT_PPM=<ppm> for flight rules, for example 10000 for a 1% RF airtime budget.
